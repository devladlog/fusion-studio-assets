<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="800" viewBox="0 0 1000 800">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#744da9"/>
      <stop offset="100%" style="stop-color:#0078d4"/>
    </linearGradient>
    <linearGradient id="triggerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078d4"/>
      <stop offset="100%" style="stop-color:#00b7c3"/>
    </linearGradient>
    <pattern id="headerPattern" patternUnits="userSpaceOnUse" width="60" height="60">
      <path d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z" fill="rgba(255,255,255,0.05)"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="800" fill="#1e1e1e"/>
  
  <!-- Header -->
  <rect width="1000" height="90" fill="url(#gradient)"/>
  <rect width="1000" height="90" fill="url(#headerPattern)"/>
  
  <!-- Header icon -->
  <rect x="24" y="21" width="48" height="48" rx="12" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="48" y="52" font-family="Segoe UI, Arial" font-size="24" fill="#ffffff" text-anchor="middle">🔄</text>
  
  <!-- Header text -->
  <text x="90" y="45" font-family="Segoe UI, Arial" font-size="22" fill="#ffffff" font-weight="700">Flow Designer</text>
  <text x="90" y="68" font-family="Segoe UI, Arial" font-size="13" fill="rgba(255,255,255,0.8)">Design Power Automate flows visually</text>
  
  <!-- Badge -->
  <rect x="860" y="30" width="115" height="30" rx="15" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="917" y="50" font-family="Segoe UI, Arial" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="700" letter-spacing="0.5">FUSION STUDIO</text>
  
  <!-- AI Prompt Card -->
  <rect x="24" y="114" width="952" height="130" rx="16" fill="#252526" stroke="#454545" stroke-width="1"/>
  <rect x="24" y="114" width="952" height="45" rx="16" fill="#2d2d30"/>
  <rect x="24" y="143" width="952" height="16" fill="#2d2d30"/>
  <rect x="24" y="158" width="952" height="1" fill="#454545"/>
  <text x="44" y="143" font-family="Segoe UI, Arial" font-size="13" fill="#ffffff" font-weight="700" letter-spacing="0.5">DESCRIBE YOUR FLOW</text>
  
  <!-- Text area -->
  <rect x="44" y="175" width="912" height="50" rx="12" fill="#2d2d30" stroke="#454545" stroke-width="1"/>
  <text x="60" y="205" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff">When a new customer is created in Dataverse, send a welcome email and create a task for follow-up</text>
  
  <!-- Flow Output Card -->
  <rect x="24" y="264" width="952" height="460" rx="16" fill="#252526" stroke="#454545" stroke-width="1"/>
  <rect x="24" y="264" width="952" height="45" rx="16" fill="#2d2d30"/>
  <rect x="24" y="293" width="952" height="16" fill="#2d2d30"/>
  <rect x="24" y="308" width="952" height="1" fill="#454545"/>
  <text x="44" y="293" font-family="Segoe UI, Arial" font-size="13" fill="#ffffff" font-weight="700" letter-spacing="0.5">GENERATED FLOW</text>
  
  <!-- Stats -->
  <rect x="780" y="275" width="80" height="28" rx="8" fill="#2d2d30" stroke="#454545" stroke-width="1"/>
  <text x="820" y="294" font-family="Segoe UI, Arial" font-size="12" fill="#969696" text-anchor="middle">4 Steps</text>
  <rect x="870" y="275" width="85" height="28" rx="8" fill="#2d2d30" stroke="#454545" stroke-width="1"/>
  <text x="912" y="294" font-family="Segoe UI, Arial" font-size="12" fill="#00b7c3" text-anchor="middle">1 Trigger</text>
  
  <!-- Flow Steps Container -->
  <!-- Step 1: Trigger -->
  <g transform="translate(44, 330)">
    <!-- Rail -->
    <circle cx="18" cy="18" r="18" fill="url(#triggerGrad)"/>
    <text x="18" y="23" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="700">1</text>
    <rect x="16" y="40" width="4" height="50" fill="#454545"/>
    
    <!-- Content -->
    <rect x="50" y="0" width="880" height="70" rx="12" fill="#2d2d30" stroke="#454545" stroke-width="1"/>
    <text x="70" y="25" font-family="Segoe UI, Arial" font-size="10" fill="#969696" text-transform="uppercase" letter-spacing="0.5">TRIGGER</text>
    <text x="70" y="48" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff" font-weight="600">When a row is added - Dataverse</text>
    <text x="70" y="63" font-family="Segoe UI, Arial" font-size="11" fill="#969696">Table: Customers</text>
  </g>
  
  <!-- Step 2: Get Customer -->
  <g transform="translate(44, 430)">
    <circle cx="18" cy="18" r="18" fill="url(#gradient)"/>
    <text x="18" y="23" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="700">2</text>
    <rect x="16" y="40" width="4" height="50" fill="#454545"/>
    
    <rect x="50" y="0" width="880" height="70" rx="12" fill="#2d2d30" stroke="#454545" stroke-width="1"/>
    <text x="70" y="25" font-family="Segoe UI, Arial" font-size="10" fill="#969696" text-transform="uppercase" letter-spacing="0.5">ACTION</text>
    <text x="70" y="48" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff" font-weight="600">Get a row by ID - Dataverse</text>
    <text x="70" y="63" font-family="Segoe UI, Arial" font-size="11" fill="#969696">Row ID: @{triggerOutputs()?['body/customerid']}</text>
  </g>
  
  <!-- Step 3: Send Email -->
  <g transform="translate(44, 530)">
    <circle cx="18" cy="18" r="18" fill="url(#gradient)"/>
    <text x="18" y="23" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="700">3</text>
    <rect x="16" y="40" width="4" height="50" fill="#454545"/>
    
    <rect x="50" y="0" width="880" height="70" rx="12" fill="#2d2d30" stroke="#454545" stroke-width="1"/>
    <text x="70" y="25" font-family="Segoe UI, Arial" font-size="10" fill="#969696" text-transform="uppercase" letter-spacing="0.5">ACTION</text>
    <text x="70" y="48" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff" font-weight="600">Send an email (V2) - Office 365 Outlook</text>
    <text x="70" y="63" font-family="Segoe UI, Arial" font-size="11" fill="#969696">To: @{outputs('Get_a_row')?['body/emailaddress']}</text>
  </g>
  
  <!-- Step 4: Create Task -->
  <g transform="translate(44, 630)">
    <circle cx="18" cy="18" r="18" fill="url(#gradient)"/>
    <text x="18" y="23" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="700">4</text>
    
    <rect x="50" y="0" width="880" height="70" rx="12" fill="#2d2d30" stroke="#454545" stroke-width="1"/>
    <text x="70" y="25" font-family="Segoe UI, Arial" font-size="10" fill="#969696" text-transform="uppercase" letter-spacing="0.5">ACTION</text>
    <text x="70" y="48" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff" font-weight="600">Add a new row - Dataverse</text>
    <text x="70" y="63" font-family="Segoe UI, Arial" font-size="11" fill="#969696">Table: Tasks | Subject: Follow up with @{outputs('Get_a_row')?['body/name']}</text>
  </g>
  
  <!-- Footer Actions -->
  <rect x="0" y="740" width="1000" height="60" fill="#252526" stroke-width="0"/>
  <rect x="0" y="740" width="1000" height="1" fill="#454545"/>
  
  <!-- Generate Button -->
  <rect x="24" y="755" width="170" height="44" rx="12" fill="url(#gradient)"/>
  <text x="109" y="783" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="700">✨ Generate Flow</text>
  
  <!-- Copy JSON Button -->
  <rect x="210" y="755" width="120" height="44" rx="12" fill="#2d2d30" stroke="#454545" stroke-width="1"/>
  <text x="270" y="783" font-family="Segoe UI, Arial" font-size="14" fill="#cccccc" text-anchor="middle">Copy JSON</text>
  
  <!-- Export Button -->
  <rect x="346" y="755" width="120" height="44" rx="12" fill="#2d2d30" stroke="#454545" stroke-width="1"/>
  <text x="406" y="783" font-family="Segoe UI, Arial" font-size="14" fill="#cccccc" text-anchor="middle">Export</text>
  
  <!-- Status indicator -->
  <circle cx="900" cy="777" r="5" fill="#16825d"/>
  <text x="915" y="782" font-family="Segoe UI, Arial" font-size="12" fill="#969696">Ready to deploy</text>
</svg>
