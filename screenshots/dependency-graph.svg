<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="700" viewBox="0 0 1000 700">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#744da9"/>
      <stop offset="100%" style="stop-color:#0078d4"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16825d"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078d4"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="varGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="colGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#454545"/>
    </marker>
    <marker id="arrowheadGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16825d"/>
    </marker>
    <pattern id="headerPattern" patternUnits="userSpaceOnUse" width="60" height="60">
      <path d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z" fill="rgba(255,255,255,0.05)"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="700" fill="#1e1e1e"/>
  
  <!-- Header -->
  <rect width="1000" height="70" fill="url(#gradient)"/>
  <rect width="1000" height="70" fill="url(#headerPattern)"/>
  
  <!-- Header icon -->
  <rect x="24" y="15" width="40" height="40" rx="10" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="44" y="42" font-family="Segoe UI, Arial" font-size="20" fill="#ffffff" text-anchor="middle">📊</text>
  
  <!-- Header text -->
  <text x="80" y="35" font-family="Segoe UI, Arial" font-size="18" fill="#ffffff" font-weight="700">Dependency Graph</text>
  <text x="80" y="55" font-family="Segoe UI, Arial" font-size="12" fill="rgba(255,255,255,0.8)">MyApp - Visualize data flow and dependencies</text>
  
  <!-- Export buttons -->
  <rect x="690" y="20" width="70" height="30" rx="6" fill="rgba(255,255,255,0.18)"/>
  <text x="725" y="40" font-family="Segoe UI, Arial" font-size="11" fill="#ffffff" text-anchor="middle">Mermaid</text>
  
  <rect x="770" y="20" width="50" height="30" rx="6" fill="rgba(255,255,255,0.1)"/>
  <text x="795" y="40" font-family="Segoe UI, Arial" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">DOT</text>
  
  <rect x="830" y="20" width="50" height="30" rx="6" fill="rgba(255,255,255,0.1)"/>
  <text x="855" y="40" font-family="Segoe UI, Arial" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">D2</text>
  
  <rect x="890" y="20" width="55" height="30" rx="6" fill="rgba(255,255,255,0.1)"/>
  <text x="917" y="40" font-family="Segoe UI, Arial" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">JSON</text>
  
  <!-- Graph Area -->
  <!-- Column Labels -->
  <text x="120" y="110" font-family="Segoe UI, Arial" font-size="12" fill="#969696" text-anchor="middle">Data Sources</text>
  <text x="400" y="110" font-family="Segoe UI, Arial" font-size="12" fill="#969696" text-anchor="middle">Screens</text>
  <text x="680" y="110" font-family="Segoe UI, Arial" font-size="12" fill="#969696" text-anchor="middle">Variables</text>
  <text x="880" y="110" font-family="Segoe UI, Arial" font-size="12" fill="#969696" text-anchor="middle">Collections</text>
  
  <!-- Data Sources -->
  <rect x="40" y="140" width="160" height="45" rx="10" fill="url(#dataGrad)"/>
  <text x="120" y="168" font-family="Segoe UI, Arial" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="600">📁 Customers</text>
  
  <rect x="40" y="210" width="160" height="45" rx="10" fill="url(#dataGrad)"/>
  <text x="120" y="238" font-family="Segoe UI, Arial" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="600">📁 Products</text>
  
  <rect x="40" y="280" width="160" height="45" rx="10" fill="url(#dataGrad)"/>
  <text x="120" y="308" font-family="Segoe UI, Arial" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="600">📁 Orders</text>
  
  <!-- Screens -->
  <rect x="320" y="140" width="160" height="45" rx="10" fill="url(#screenGrad)"/>
  <text x="400" y="168" font-family="Segoe UI, Arial" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="600">🖥️ HomeScreen</text>
  
  <rect x="320" y="230" width="160" height="45" rx="10" fill="url(#screenGrad)"/>
  <text x="400" y="258" font-family="Segoe UI, Arial" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="600">🖥️ DetailScreen</text>
  
  <rect x="320" y="320" width="160" height="45" rx="10" fill="url(#screenGrad)"/>
  <text x="400" y="348" font-family="Segoe UI, Arial" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="600">🖥️ FormScreen</text>
  
  <!-- Variables -->
  <rect x="600" y="160" width="160" height="45" rx="10" fill="url(#varGrad)"/>
  <text x="680" y="188" font-family="Segoe UI, Arial" font-size="13" fill="#1e1e1e" text-anchor="middle" font-weight="600">varCurrentUser</text>
  
  <rect x="600" y="250" width="160" height="45" rx="10" fill="url(#varGrad)"/>
  <text x="680" y="278" font-family="Segoe UI, Arial" font-size="13" fill="#1e1e1e" text-anchor="middle" font-weight="600">varSelectedItem</text>
  
  <!-- Collections -->
  <rect x="800" y="200" width="160" height="45" rx="10" fill="url(#colGrad)"/>
  <text x="880" y="228" font-family="Segoe UI, Arial" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="600">colCartItems</text>
  
  <!-- Connections -->
  <!-- Data to Screens -->
  <line x1="200" y1="162" x2="320" y2="162" stroke="#454545" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="200" y1="232" x2="320" y2="252" stroke="#454545" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="200" y1="302" x2="320" y2="342" stroke="#454545" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Screens to Variables -->
  <line x1="480" y1="162" x2="600" y2="182" stroke="#454545" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="480" y1="252" x2="600" y2="272" stroke="#454545" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Screens to Collections -->
  <line x1="480" y1="342" x2="800" y2="222" stroke="#454545" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Screen to Screen navigation -->
  <path d="M 400 185 Q 400 207 400 230" stroke="#16825d" stroke-width="2" fill="none" marker-end="url(#arrowheadGreen)"/>
  <path d="M 400 275 Q 400 297 400 320" stroke="#16825d" stroke-width="2" fill="none" marker-end="url(#arrowheadGreen)"/>
  
  <!-- Variables to Screens (dotted) -->
  <line x1="600" y1="272" x2="480" y2="342" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowhead)"/>
  
  <!-- Legend Card -->
  <rect x="40" y="410" width="920" height="130" rx="12" fill="#252526" stroke="#454545" stroke-width="1"/>
  <text x="60" y="440" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff" font-weight="600">Legend</text>
  
  <!-- Legend items -->
  <rect x="60" y="460" width="80" height="25" rx="6" fill="url(#dataGrad)"/>
  <text x="160" y="478" font-family="Segoe UI, Arial" font-size="12" fill="#cccccc">Data Source</text>
  
  <rect x="260" y="460" width="80" height="25" rx="6" fill="url(#screenGrad)"/>
  <text x="360" y="478" font-family="Segoe UI, Arial" font-size="12" fill="#cccccc">Screen</text>
  
  <rect x="460" y="460" width="80" height="25" rx="6" fill="url(#varGrad)"/>
  <text x="560" y="478" font-family="Segoe UI, Arial" font-size="12" fill="#cccccc">Variable</text>
  
  <rect x="660" y="460" width="80" height="25" rx="6" fill="url(#colGrad)"/>
  <text x="760" y="478" font-family="Segoe UI, Arial" font-size="12" fill="#cccccc">Collection</text>
  
  <!-- Connection types -->
  <line x1="60" y1="510" x2="100" y2="510" stroke="#454545" stroke-width="2"/>
  <text x="120" y="515" font-family="Segoe UI, Arial" font-size="12" fill="#cccccc">Dependency</text>
  
  <line x1="260" y1="510" x2="300" y2="510" stroke="#16825d" stroke-width="2"/>
  <text x="320" y="515" font-family="Segoe UI, Arial" font-size="12" fill="#cccccc">Navigation</text>
  
  <line x1="460" y1="510" x2="500" y2="510" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="520" y="515" font-family="Segoe UI, Arial" font-size="12" fill="#cccccc">Reference</text>
  
  <!-- Stats Card -->
  <rect x="40" y="560" width="920" height="60" rx="12" fill="#2d2d30" stroke="#454545" stroke-width="1"/>
  
  <!-- Stats -->
  <text x="100" y="597" font-family="Segoe UI, Arial" font-size="24" fill="#ffffff" font-weight="700" text-anchor="middle">9</text>
  <text x="100" y="612" font-family="Segoe UI, Arial" font-size="11" fill="#969696" text-anchor="middle">Nodes</text>
  
  <rect x="200" y="570" width="1" height="40" fill="#454545"/>
  
  <text x="300" y="597" font-family="Segoe UI, Arial" font-size="24" fill="#ffffff" font-weight="700" text-anchor="middle">9</text>
  <text x="300" y="612" font-family="Segoe UI, Arial" font-size="11" fill="#969696" text-anchor="middle">Edges</text>
  
  <rect x="400" y="570" width="1" height="40" fill="#454545"/>
  
  <text x="500" y="597" font-family="Segoe UI, Arial" font-size="24" fill="#ffffff" font-weight="700" text-anchor="middle">3</text>
  <text x="500" y="612" font-family="Segoe UI, Arial" font-size="11" fill="#969696" text-anchor="middle">Max Depth</text>
  
  <rect x="600" y="570" width="1" height="40" fill="#454545"/>
  
  <circle cx="700" cy="590" r="10" fill="#16825d"/>
  <text x="700" y="595" font-family="Segoe UI, Arial" font-size="12" fill="#ffffff" text-anchor="middle">✓</text>
  <text x="700" y="612" font-family="Segoe UI, Arial" font-size="11" fill="#969696" text-anchor="middle">No Cycles</text>
  
  <rect x="800" y="570" width="1" height="40" fill="#454545"/>
  
  <text x="880" y="597" font-family="Segoe UI, Arial" font-size="24" fill="#ffffff" font-weight="700" text-anchor="middle">3</text>
  <text x="880" y="612" font-family="Segoe UI, Arial" font-size="11" fill="#969696" text-anchor="middle">Data Sources</text>
  
  <!-- Footer -->
  <text x="500" y="680" font-family="Segoe UI, Arial" font-size="11" fill="#969696" text-anchor="middle">Export to Mermaid, DOT, D2, or JSON for documentation and analysis</text>
</svg>
