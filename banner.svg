<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#744da9"/>
      <stop offset="50%" style="stop-color:#0078d4"/>
      <stop offset="100%" style="stop-color:#16825d"/>
    </linearGradient>
    <pattern id="pattern" patternUnits="userSpaceOnUse" width="80" height="80">
      <path d="M40 40m-2 0a2 2 0 1 0 4 0a2 2 0 1 0-4 0" fill="rgba(255,255,255,0.08)"/>
      <path d="M0 40m-1.5 0a1.5 1.5 0 1 0 3 0a1.5 1.5 0 1 0-3 0" fill="rgba(255,255,255,0.05)"/>
      <path d="M40 0m-1.5 0a1.5 1.5 0 1 0 3 0a1.5 1.5 0 1 0-3 0" fill="rgba(255,255,255,0.05)"/>
      <path d="M80 40m-1.5 0a1.5 1.5 0 1 0 3 0a1.5 1.5 0 1 0-3 0" fill="rgba(255,255,255,0.05)"/>
      <path d="M40 80m-1.5 0a1.5 1.5 0 1 0 3 0a1.5 1.5 0 1 0-3 0" fill="rgba(255,255,255,0.05)"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#gradient)"/>
  <rect width="1200" height="300" fill="url(#pattern)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="50" r="150" fill="rgba(255,255,255,0.03)"/>
  <circle cx="1100" cy="250" r="200" fill="rgba(255,255,255,0.03)"/>
  <circle cx="600" cy="300" r="100" fill="rgba(255,255,255,0.02)"/>
  
  <!-- Logo container -->
  <rect x="80" y="90" width="120" height="120" rx="24" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  
  <!-- Power Apps logo stylized -->
  <g transform="translate(100, 110)">
    <!-- Purple app icon -->
    <rect x="10" y="10" width="35" height="35" rx="8" fill="#742774"/>
    <text x="27" y="35" font-family="Segoe UI, Arial" font-size="20" fill="white" text-anchor="middle" font-weight="bold">P</text>
    
    <!-- Connector lines -->
    <line x1="50" y1="27" x2="65" y2="27" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
    <line x1="27" y1="50" x2="27" y2="65" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
    
    <!-- Blue component -->
    <rect x="45" y="45" width="30" height="30" rx="6" fill="#0078d4"/>
    <circle cx="60" cy="60" r="8" fill="rgba(255,255,255,0.3)"/>
    
    <!-- Code bracket -->
    <text x="60" y="65" font-family="Consolas, monospace" font-size="14" fill="white" text-anchor="middle">&lt;/&gt;</text>
  </g>
  
  <!-- Main title -->
  <text x="230" y="145" font-family="Segoe UI, Arial" font-size="52" fill="#ffffff" font-weight="700" filter="url(#glow)">Power Apps</text>
  <text x="230" y="200" font-family="Segoe UI, Arial" font-size="42" fill="rgba(255,255,255,0.95)" font-weight="600">Fusion Studio</text>
  
  <!-- Tagline -->
  <text x="230" y="245" font-family="Segoe UI, Arial" font-size="18" fill="rgba(255,255,255,0.8)">Pro-Code Superpowers for Your Low-Code Apps</text>
  
  <!-- Feature badges -->
  <g transform="translate(750, 100)">
    <!-- AI badge -->
    <rect x="0" y="0" width="100" height="36" rx="18" fill="rgba(255,255,255,0.2)"/>
    <text x="50" y="24" font-family="Segoe UI, Arial" font-size="13" fill="white" text-anchor="middle">🤖 AI Powered</text>
    
    <!-- Git badge -->
    <rect x="115" y="0" width="90" height="36" rx="18" fill="rgba(255,255,255,0.2)"/>
    <text x="160" y="24" font-family="Segoe UI, Arial" font-size="13" fill="white" text-anchor="middle">🔀 Git First</text>
    
    <!-- Linting badge -->
    <rect x="220" y="0" width="90" height="36" rx="18" fill="rgba(255,255,255,0.2)"/>
    <text x="265" y="24" font-family="Segoe UI, Arial" font-size="13" fill="white" text-anchor="middle">🔍 Linting</text>
  </g>
  
  <g transform="translate(750, 150)">
    <!-- Visual badge -->
    <rect x="0" y="0" width="120" height="36" rx="18" fill="rgba(255,255,255,0.2)"/>
    <text x="60" y="24" font-family="Segoe UI, Arial" font-size="13" fill="white" text-anchor="middle">📊 Visual Design</text>
    
    <!-- VS Code badge -->
    <rect x="135" y="0" width="90" height="36" rx="18" fill="rgba(255,255,255,0.2)"/>
    <text x="180" y="24" font-family="Segoe UI, Arial" font-size="13" fill="white" text-anchor="middle">💻 VS Code</text>
  </g>
  
  <!-- Version badge -->
  <rect x="1050" y="250" width="100" height="30" rx="15" fill="rgba(0,0,0,0.3)"/>
  <text x="1100" y="271" font-family="Segoe UI, Arial" font-size="14" fill="white" text-anchor="middle">v0.4.0</text>
</svg>
